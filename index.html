<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Martengo">
<meta name="theme-color" content="#080808">
<title>Martengo · Prédiction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--bg2:#101010;--bg3:#181818;--bg4:#202020;
  --border:#282828;--border2:#333;
  --gold:#c8942a;--gold-lite:#e8b84b;--gold-dim:rgba(200,148,42,.12);
  --copper:#b5603a;--copper-dim:rgba(181,96,58,.12);
  --green:#3a9162;--green-dim:rgba(58,145,98,.15);
  --red:#8c3a3a;--red-dim:rgba(140,58,58,.15);
  --text:#e4dccb;--text-dim:#6a6255;--text-mid:#9a8e7c;
  --r:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:15px;min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
#app{max-width:480px;margin:0 auto;padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bot) + 76px)}
#app::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.6}

.header{display:flex;align-items:flex-end;justify-content:space-between;padding:20px 20px 14px;border-bottom:1px solid var(--border);position:relative}
.header::after{content:'';position:absolute;bottom:0;left:20px;right:20px;height:1px;background:linear-gradient(90deg,var(--gold) 0%,transparent 60%);opacity:.4}
.header-brand{display:flex;flex-direction:column;gap:2px}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:4px;color:var(--gold);line-height:1}
.header-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase}
.header-status{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);padding:6px 10px;border:1px solid var(--border);border-radius:20px;background:var(--bg2)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);transition:background .4s,box-shadow .4s;flex-shrink:0}
.dot.online{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot.error{background:var(--red);box-shadow:0 0 8px var(--red)}
.dot.loading{background:var(--gold);animation:pulse-dot 1s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

.nav{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.nav-btn{background:none;border:none;color:var(--text-dim);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:12px 0 10px;cursor:pointer;position:relative;transition:color .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.nav-icon{font-size:15px;line-height:1;transition:transform .2s}
.nav-btn.active{color:var(--gold)}
.nav-btn.active .nav-icon{transform:translateY(-1px)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:2px}
.nav-badge{position:absolute;top:8px;right:calc(25% - 4px);width:7px;height:7px;border-radius:50%;background:var(--gold);border:1.5px solid var(--bg);display:none}
.nav-badge.show{display:block}

.screen{display:none;padding:18px}
.screen.active{display:block}
#screens-wrapper{overflow:hidden;touch-action:pan-y}

.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2.5px;color:var(--gold-lite);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2) 0%,transparent 100%)}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;position:relative}

.field-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.field-group{display:flex;flex-direction:column}
input[type="text"],input[type="number"],input[type="date"]{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Space Mono',monospace;font-size:16px;padding:10px 12px;width:100%;outline:none;transition:border-color .2s,background .2s;-webkit-appearance:none;appearance:none}
input:focus{border-color:var(--gold);background:var(--bg4)}
input::placeholder{color:var(--text-dim)}
input[readonly]{opacity:.5;cursor:default}

.btn{background:var(--gold);color:#080808;border:none;border-radius:8px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:12px 18px;cursor:pointer;transition:opacity .15s,transform .1s,box-shadow .2s;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px}
.btn:hover{box-shadow:0 4px 20px rgba(200,148,42,.3)}
.btn:active{opacity:.75;transform:scale(.97);box-shadow:none}
.btn.full{width:100%;padding:15px;font-size:12px;margin-top:6px}
.btn.secondary{background:var(--bg3);color:var(--text-mid);border:1px solid var(--border);box-shadow:none}
.btn.secondary:hover{border-color:var(--border2);box-shadow:none}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.btn-icon{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:border-color .2s,color .2s;flex-shrink:0}
.btn-icon:hover{border-color:var(--border2);color:var(--text)}
.btn-icon:active{opacity:.6}

.pmu-block{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.pmu-block-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.pmu-block-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:.5;flex-shrink:0}
.pmu-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:flex-end}
.progress-wrap{margin-top:10px;display:none}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px}
.progress-pct{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);font-weight:700}
.progress-track{height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:var(--gold);transition:width .5s ease,background .3s}
.pmu-msg{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);margin-top:8px;min-height:14px;letter-spacing:.5px}
.pmu-msg.error{color:#e05c5c}

.retry-banner{display:none;align-items:center;justify-content:space-between;gap:10px;background:var(--red-dim);border:1px solid rgba(140,58,58,.4);border-radius:8px;padding:10px 14px;margin-top:10px}
.retry-banner.show{display:flex}
.retry-banner-text{font-family:'Space Mono',monospace;font-size:9px;color:#e05c5c;letter-spacing:.5px;flex:1}
.retry-btn{background:rgba(140,58,58,.3);border:1px solid rgba(140,58,58,.5);border-radius:6px;color:#e05c5c;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;cursor:pointer;transition:background .2s;white-space:nowrap;flex-shrink:0}
.retry-btn:hover{background:rgba(140,58,58,.5)}

.horse-header{display:grid;grid-template-columns:54px 1fr 90px 38px;gap:6px;padding:0 2px 8px;font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);margin-bottom:10px}
#horse-list{display:flex;flex-direction:column;gap:8px}
.horse-row{display:grid;grid-template-columns:54px 1fr 90px 38px;gap:6px;align-items:center}
.horse-num-input{text-align:center !important;font-family:'Bebas Neue',sans-serif !important;font-size:20px !important;color:var(--gold) !important;padding:8px 4px !important}
.horse-note-wrap{display:flex;flex-direction:column;gap:3px}
.pmu-badge{display:inline-flex;align-items:center;gap:4px;font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);cursor:pointer;border:1px solid rgba(200,148,42,.3);border-radius:4px;padding:2px 6px;background:var(--gold-dim);transition:background .15s;width:fit-content}
.pmu-badge:hover{background:rgba(200,148,42,.2)}
.pmu-badge.applied{background:rgba(200,148,42,.25);border-color:rgba(200,148,42,.6)}
.note-diff-warn{display:inline-flex;align-items:center;gap:4px;font-family:'Space Mono',monospace;font-size:8px;color:var(--copper);background:var(--copper-dim);border:1px solid rgba(181,96,58,.3);border-radius:4px;padding:2px 6px;margin-top:2px}

.pred-meta{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);margin-bottom:16px;letter-spacing:1px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.version-badge{font-family:'Space Mono',monospace;font-size:8px;color:var(--gold);border:1px solid rgba(200,148,42,.4);border-radius:4px;padding:2px 6px;letter-spacing:1px}
.winner-card{background:linear-gradient(135deg,rgba(200,148,42,.1) 0%,var(--bg2) 50%);border:1px solid rgba(200,148,42,.4);border-radius:var(--r);padding:20px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.winner-num{font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:1;color:var(--gold);min-width:56px;text-align:center}
.winner-info{flex:1;min-width:0}
.winner-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.winner-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.winner-note{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-mid)}
.winner-conf{text-align:right;flex-shrink:0}
.winner-conf-val{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;color:var(--gold-lite)}
.winner-conf-label{font-family:'Space Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.sel-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.sel-row:last-child{border-bottom:none}
.sel-rank{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);width:50px;flex-shrink:0;text-align:center;line-height:1.4}
.sel-circle{width:38px;height:38px;border-radius:50%;background:var(--bg3);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;flex-shrink:0}
.sel-circle.highlight{border-color:var(--gold);color:var(--gold)}
.sel-circle.joker{border-color:var(--copper);color:var(--copper);border-style:dashed}
.sel-body{flex:1;min-width:0}
.sel-name{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.sel-cote{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:5px}
.sel-bar-track{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.sel-bar-fill{height:100%;border-radius:2px;background:var(--gold);transition:width .6s cubic-bezier(.4,0,.2,1)}
.sel-bar-fill.dim{background:var(--border2)}
.sel-conf{text-align:right;min-width:50px;flex-shrink:0}
.sel-conf-val{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--gold)}
.sel-conf-val.dim{color:var(--text-mid)}
.sel-conf-label{font-family:'Space Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:.5px;margin-top:2px}

.analyse-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.analyse-card.rank-1{border-color:rgba(200,148,42,.5)}
.analyse-card.rank-2{border-color:rgba(120,120,120,.4)}
.analyse-card.rank-3{border-color:rgba(181,96,58,.4)}
.analyse-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.analyse-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;flex-shrink:0}
.analyse-info{flex:1;min-width:0}
.analyse-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.analyse-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);margin-top:2px}
.analyse-note{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;flex-shrink:0}
.analyse-note span{font-size:12px;color:var(--text-dim);font-family:'Space Mono',monospace}
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dim-cell{background:var(--bg3);border-radius:6px;padding:8px}
.dim-label{font-family:'Space Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.dim-bar-track{height:3px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-bottom:3px}
.dim-bar-fill{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.dim-val{font-family:'Space Mono',monospace;font-size:10px;text-align:right;font-weight:700}
.analyse-footer{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim)}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.kpi{background:var(--bg3);border-radius:8px;padding:12px 14px;border:1px solid var(--border)}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:var(--gold);margin-bottom:2px}
.kpi-label{font-family:'Space Mono',monospace;font-size:8px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.kpi.accent{background:var(--gold-dim);border-color:rgba(200,148,42,.3)}
.kpi.accent .kpi-val{color:var(--gold-lite)}
.stat-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.stat-block-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px}
.acc-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.acc-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-mid);width:80px;flex-shrink:0}
.acc-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.acc-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold) 0%,var(--gold-lite) 100%);transition:width .8s cubic-bezier(.4,0,.2,1)}
.acc-pct{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--gold);min-width:38px;text-align:right}
.dist-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.dist-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);width:48px;flex-shrink:0;text-align:right}
.dist-track{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.dist-fill{height:100%;border-radius:2px;transition:width .6s ease}
.dist-count{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);min-width:32px;text-align:right}

.result-horse{display:grid;grid-template-columns:46px 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
.result-num{background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);text-align:center;padding:6px 0;line-height:1}
.rang-input{width:70px !important;text-align:center !important}
.result-pred{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim)}
.result-pred.top{color:var(--gold)}

#toast{position:fixed;bottom:calc(var(--safe-bot) + 88px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:12px 20px;border-radius:30px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:100;letter-spacing:.5px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:rgba(58,145,98,.5);color:#5fcd8a}
#toast.error{border-color:rgba(140,58,58,.5);color:#e05c5c}

.spinner{width:14px;height:14px;border:2px solid rgba(8,8,8,.3);border-top-color:#080808;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.spinner-gold{border-color:var(--border2);border-top-color:var(--gold)}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-block{display:flex;align-items:center;justify-content:center;gap:12px;padding:48px 20px;color:var(--text-dim);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px}
.empty{text-align:center;padding:52px 20px;color:var(--text-dim);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;line-height:1.8}
.empty-icon{font-size:36px;margin-bottom:14px;opacity:.6}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .35s ease forwards}
.fd1{animation-delay:.05s;opacity:0}.fd2{animation-delay:.1s;opacity:0}.fd3{animation-delay:.15s;opacity:0}.fd4{animation-delay:.2s;opacity:0}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-brand">
      <div class="header-title">Martengo</div>
      <div class="header-sub">Prédiction trot attelé</div>
    </div>
    <div class="header-status">
      <div class="dot loading" id="status-dot"></div>
      <span id="status-text">connexion…</span>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="goTo('saisie')" id="tab-saisie"><span class="nav-icon">✏️</span>Saisie</button>
    <button class="nav-btn" onclick="goTo('selections')" id="tab-selections"><span class="nav-icon">🎯</span>Sélections</button>
    <button class="nav-btn" onclick="goTo('analyse')" id="tab-analyse"><span class="nav-icon">🔬</span>Analyse</button>
    <button class="nav-btn" onclick="goTo('stats')" id="tab-stats">
      <span class="nav-icon">📊</span>Stats
      <span class="nav-badge" id="badge-stats"></span>
    </button>
  </nav>

  <div id="screens-wrapper">

    <!-- SAISIE -->
    <div class="screen active" id="screen-saisie">
      <div class="card">
        <div style="display:grid;grid-template-columns:1fr auto;gap:10px;align-items:flex-end;margin-bottom:14px;">
          <div class="field-group">
            <div class="field-label">Date de la course</div>
            <input type="date" id="course-date">
          </div>
          <button class="btn secondary" onclick="viderCourse()">Vider</button>
        </div>

        <div class="pmu-block">
          <div class="pmu-block-label">Notes PMU automatiques</div>
          <div class="pmu-grid">
            <div class="field-group">
              <div class="field-label">Réunion</div>
              <input type="number" id="pmu-reunion" placeholder="1" min="1" max="9" value="1">
            </div>
            <div class="field-group">
              <div class="field-label">Course</div>
              <input type="number" id="pmu-course" placeholder="5" min="1" max="20">
            </div>
            <button class="btn secondary" id="btn-pmu" onclick="chargerEtAnalyser()" style="font-size:10px;">Charger →</button>
          </div>
          <div class="progress-wrap" id="pmu-progress-wrap">
            <div class="progress-top">
              <span class="progress-label" id="pmu-progress-label"></span>
              <span class="progress-pct" id="pmu-progress-pct"></span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="pmu-progress-bar" style="width:0%"></div></div>
          </div>
          <div class="pmu-msg" id="pmu-msg"></div>
          <div class="retry-banner" id="pmu-retry-banner">
            <span class="retry-banner-text" id="pmu-retry-text">Erreur</span>
            <button class="retry-btn" onclick="chargerEtAnalyser()">↺ Réessayer</button>
          </div>
        </div>

        <div class="horse-header"><div>N°</div><div>Note</div><div>Cote</div><div></div></div>
        <div id="horse-list"></div>
        <button class="btn secondary full" onclick="ajouterCheval()" style="margin-top:10px;">+ Ajouter un cheval</button>
      </div>

      <div class="retry-banner" id="api-retry-banner">
        <span class="retry-banner-text">API hors ligne — redémarre en ~30s</span>
        <button class="retry-btn" onclick="checkHealth(true)">↺ Réessayer</button>
      </div>

      <button class="btn full" onclick="lancerPrediction()" id="btn-predict" style="margin-top:10px;">Analyser la course →</button>
    </div>

    <!-- SÉLECTIONS -->
    <div class="screen" id="screen-selections">
      <div id="selections-content">
        <div class="empty"><div class="empty-icon">🎯</div>Analysez une course<br>pour voir les sélections</div>
      </div>
    </div>

    <!-- ANALYSE -->
    <div class="screen" id="screen-analyse">
      <div id="analyse-content">
        <div class="empty"><div class="empty-icon">🔬</div>Chargez les notes PMU<br>pour voir l'analyse détaillée</div>
      </div>
    </div>

    <!-- STATS + RÉSULTATS -->
    <div class="screen" id="screen-stats">
      <div id="stats-content">
        <div class="loading-block"><div class="spinner spinner-gold"></div><span>Chargement…</span></div>
      </div>
      <div id="result-section" style="display:none;">
        <div class="section-title" style="margin-top:16px;">Enregistrer résultats</div>
        <div id="result-content"></div>
      </div>
    </div>

  </div>
</div>
<div id="toast"></div>
<script>
const API_URL = "https://martengo-api-v5.onrender.com";
const LS_SAISIE = 'martengo_v3', LS_HIST = 'martengo_hist';
const SCREENS = ['saisie','selections','analyse','stats'];

let chevaux = [], predictions = null, notesPMU = {}, notesPMUData = null;
let currentDate = '', horseCounter = 0, apiPrete = false, currentScreen = 'saisie';

// ── LocalStorage ──
function sauvegarder() {
  try { localStorage.setItem(LS_SAISIE, JSON.stringify({ date: document.getElementById('course-date').value, reunion: document.getElementById('pmu-reunion').value, course: document.getElementById('pmu-course').value, chevaux, notesPMU })); } catch(e) {}
}
function restaurer() {
  try {
    const d = JSON.parse(localStorage.getItem(LS_SAISIE)||'null');
    if (!d) return false;
    if (d.date && /^\d{4}-\d{2}-\d{2}$/.test(d.date)) { document.getElementById('course-date').value = d.date; currentDate = d.date; }
    if (d.reunion) document.getElementById('pmu-reunion').value = d.reunion;
    if (d.course)  document.getElementById('pmu-course').value  = d.course;
    if (d.notesPMU) notesPMU = d.notesPMU;
    if (d.chevaux && d.chevaux.length > 0) { chevaux = d.chevaux; horseCounter = Math.max(...chevaux.map(c=>c.id),0); renderHorses(); return true; }
  } catch(e) {}
  return false;
}
function effacer() { try { localStorage.removeItem(LS_SAISIE); } catch(e) {} }

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('course-date').value = today; currentDate = today;
  if (!restaurer()) for (let i=0;i<3;i++) ajouterCheval();
  else toast('Course restaurée', 'success');
  document.getElementById('course-date').addEventListener('change', e => {
    currentDate = e.target.value;
    if (Object.keys(notesPMU).length > 0) setPmuMsg('⚠ Date modifiée — rechargez les notes PMU');
    sauvegarder();
  });
  checkHealth(true);
  setInterval(() => checkHealth(false), 30000);
  initSwipe();
});

// ── Navigation ──
function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  document.getElementById('tab-'+screen).classList.add('active');
  currentScreen = screen;
  if (screen === 'stats') { chargerStats(); document.getElementById('badge-stats').classList.remove('show'); }
}
function setBadge(show) { document.getElementById('badge-stats').classList.toggle('show', show && currentScreen !== 'stats'); }

// ── Swipe ──
function initSwipe() {
  const w = document.getElementById('screens-wrapper');
  let sx=0, sy=0, moved=false;
  w.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; moved=false; }, {passive:true});
  w.addEventListener('touchmove',  e => { const dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy; if (!moved && Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>20) moved=true; }, {passive:true});
  w.addEventListener('touchend',   e => {
    if (!moved) return;
    const dx = e.changedTouches[0].clientX - sx;
    const idx = SCREENS.indexOf(currentScreen);
    if (dx < -40 && idx < SCREENS.length-1) goTo(SCREENS[idx+1]);
    else if (dx > 40 && idx > 0) goTo(SCREENS[idx-1]);
  });
}

// ── Health ──
let _hTimer=null, _hPct=10;
async function checkHealth(isFirst) {
  const dot=document.getElementById('status-dot'), text=document.getElementById('status-text'), banner=document.getElementById('api-retry-banner');
  if (isFirst && !apiPrete) {
    dot.className='dot loading'; text.textContent='démarrage…';
    document.getElementById('btn-pmu').disabled=true;
    setPmuProgress(10,'Démarrage du serveur…'); _hPct=10;
    clearInterval(_hTimer);
    _hTimer=setInterval(()=>{ _hPct=Math.min(_hPct+2,85); setPmuProgress(_hPct,'Chargement des données…'); },1200);
    try {
      const resp=await fetch(`${API_URL}/health`,{signal:AbortSignal.timeout(50000)});
      clearInterval(_hTimer);
      if (!resp.ok) throw new Error();
      const data=await resp.json(); apiPrete=true;
      dot.className='dot online'; text.textContent=`${(data.courses||0).toLocaleString('fr')} courses`;
      document.getElementById('btn-pmu').disabled=false;
      banner.classList.remove('show');
      setPmuProgress(100,`✓ Prêt — ${(data.courses||0).toLocaleString('fr')} courses`,'#5fcd8a');
      setTimeout(()=>clearPmuProgress(),1500);
    } catch { clearInterval(_hTimer); dot.className='dot error'; text.textContent='hors ligne'; clearPmuProgress(''); banner.classList.add('show'); showPmuRetry('Serveur en démarrage — jusqu\'à 50s sur Render Free'); }
  } else {
    try {
      const resp=await fetch(`${API_URL}/health`,{signal:AbortSignal.timeout(10000)});
      if (!resp.ok) throw new Error();
      const data=await resp.json();
      if (!apiPrete) { apiPrete=true; document.getElementById('btn-pmu').disabled=false; banner.classList.remove('show'); clearPmuProgress(''); }
      dot.className='dot online'; text.textContent=`${(data.courses||0).toLocaleString('fr')} courses`;
    } catch { dot.className='dot error'; text.textContent='hors ligne'; if (apiPrete) { apiPrete=false; banner.classList.add('show'); } }
  }
}

// ── Progress helpers ──
function setPmuProgress(pct, label, color) {
  const c=color||'var(--gold)';
  document.getElementById('pmu-progress-wrap').style.display='block';
  document.getElementById('pmu-msg').textContent='';
  document.getElementById('pmu-retry-banner').classList.remove('show');
  document.getElementById('pmu-progress-pct').textContent=pct<100?`${Math.round(pct)}%`:'';
  document.getElementById('pmu-progress-pct').style.color=c;
  document.getElementById('pmu-progress-label').textContent=label;
  document.getElementById('pmu-progress-bar').style.width=`${pct}%`;
  document.getElementById('pmu-progress-bar').style.background=c;
}
function clearPmuProgress(msg) { document.getElementById('pmu-progress-wrap').style.display='none'; document.getElementById('pmu-msg').textContent=msg!==undefined?msg:''; document.getElementById('pmu-msg').className='pmu-msg'; }
function setPmuMsg(msg, isError) { document.getElementById('pmu-progress-wrap').style.display='none'; const el=document.getElementById('pmu-msg'); el.textContent=msg; el.className='pmu-msg'+(isError?' error':''); }
function showPmuRetry(msg) { document.getElementById('pmu-retry-text').textContent=msg; document.getElementById('pmu-retry-banner').classList.add('show'); }

// ── Charger notes PMU (retourne data ou lance exception) ──
async function chargerNotesPMU() {
  const dateVal=document.getElementById('course-date').value, reunVal=document.getElementById('pmu-reunion').value, coursVal=document.getElementById('pmu-course').value;
  if (!reunVal||!coursVal) { toast('Remplissez réunion et course','error'); return null; }
  const p=dateVal.split('-');
  const datePMU = (p.length===3&&p[0].length===4) ? p[2]+p[1]+p[0] : (() => { const d=new Date(dateVal); if(isNaN(d.getTime())){toast('Format de date invalide','error');return null;} return String(d.getDate()).padStart(2,'0')+String(d.getMonth()+1).padStart(2,'0')+d.getFullYear(); })();
  if (!datePMU) return null;

  const btn=document.getElementById('btn-pmu');
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div>';
  document.getElementById('pmu-retry-banner').classList.remove('show');
  setPmuProgress(15,'Connexion API PMU…');
  let pt=setInterval(()=>{ const b=document.getElementById('pmu-progress-bar'); if(b){const c=parseFloat(b.style.width)||15; if(c<70) setPmuProgress(c+3,'Récupération des participants…');} },700);
  try {
    const resp=await fetch(`${API_URL}/notes_pmu?date=${datePMU}&reunion=${reunVal}&course=${coursVal}`,{signal:AbortSignal.timeout(30000)});
    clearInterval(pt);
    if (!resp.ok) { const t=await resp.text(); let m=`HTTP ${resp.status}`; try{m=JSON.parse(t).error||m;}catch(_){} throw new Error(m); }
    const data=JSON.parse(await resp.text());
    notesPMUData=data; notesPMU={};
    data.chevaux.forEach(c=>{ notesPMU[c.numero]=c; });
    return data;
  } catch(e) { clearInterval(pt); throw e; }
  finally { btn.disabled=false; btn.innerHTML='Charger →'; }
}

// ── Action principale : PMU + predict en parallèle ──
async function chargerEtAnalyser() {
  try {
    const pmuData=await chargerNotesPMU();
    if (!pmuData) return;

    // Peupler ou compléter la liste
    if (chevaux.length===0) {
      chevaux=[]; horseCounter=0;
      pmuData.chevaux.sort((a,b)=>a.numero-b.numero).forEach(c=>{ horseCounter++; chevaux.push({id:horseCounter,numero:c.numero,note:c.note_pmu,rapport:c.cote!==null?c.cote:''}); });
    } else {
      chevaux.forEach(c=>{ const p=notesPMU[c.numero]; if(p){ if(c.note===''||c.note===0)c.note=p.note_pmu; if((c.rapport===''||c.rapport===0)&&p.cote!==null)c.rapport=p.cote; } });
    }
    renderHorses(); sauvegarder();

    // Analyse V6 immédiate
    if (pmuData.chevaux[0]?.scores) renderAnalyse(pmuData);
    setPmuProgress(75,`${pmuData.chevaux.length} chevaux — calcul prédictions…`);

    // /predict avec les notes courantes (manuelles si modifiées)
    const payload=chevaux.filter(c=>c.numero&&c.note!==''&&c.rapport!=='').map(c=>({numero:c.numero,note:c.note,rapport:c.rapport}));
    if (payload.length>=2) {
      try {
        const resp2=await fetch(`${API_URL}/predict`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chevaux:payload}),signal:AbortSignal.timeout(30000)});
        if (resp2.ok) { predictions=await resp2.json(); renderSelections(predictions,notesPMU); renderResultForm(payload); setBadge(true); }
      } catch(_) { /* predict optionnel */ }
    }
    setPmuProgress(100,`✓ ${pmuData.chevaux.length} chevaux · analyse complète`,'#5fcd8a');
    setTimeout(()=>clearPmuProgress(''),1200);
    toast(`Prêt — ${pmuData.chevaux.length} chevaux`,'success');

    // Vibration
    if (navigator.vibrate) navigator.vibrate(40);

  } catch(e) { setPmuMsg(e.message,true); showPmuRetry(e.message); toast(e.message,'error'); }
}

// ── /predict seul ──
async function lancerPrediction() {
  const payload=chevaux.filter(c=>c.numero&&c.note!==''&&c.rapport!=='').map(c=>({numero:c.numero,note:c.note,rapport:c.rapport}));
  if (payload.length<2){toast('Remplissez au moins 2 chevaux','error');return;}
  const btn=document.getElementById('btn-predict');
  btn.disabled=true; btn.innerHTML='<div class="spinner"></div> Analyse…';
  goTo('selections');
  document.getElementById('selections-content').innerHTML='<div class="loading-block"><div class="spinner spinner-gold"></div><span>Calcul en cours…</span></div>';
  try {
    const resp=await fetch(`${API_URL}/predict`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chevaux:payload}),signal:AbortSignal.timeout(30000)});
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    predictions=await resp.json();
    renderSelections(predictions,notesPMU);
    renderResultForm(payload);
    currentDate=document.getElementById('course-date').value;
    setBadge(true);
    if (navigator.vibrate) navigator.vibrate(40);
  } catch(e) {
    document.getElementById('selections-content').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div>Erreur de connexion<br><div style="margin-top:12px;"><button class="btn secondary" onclick="lancerPrediction()" style="font-size:10px;">↺ Réessayer</button></div></div>`;
    toast('Erreur de connexion','error');
  } finally { btn.disabled=false; btn.innerHTML='Analyser la course →'; }
}

// ── Chevaux — onchange (pas oninput) pour ne pas rebuilder le DOM à chaque frappe ──
let _sv=null;
function ajouterCheval() { horseCounter++; chevaux.push({id:horseCounter,numero:horseCounter,note:'',rapport:''}); renderHorses(); sauvegarder(); }
function supprimerCheval(id) { chevaux=chevaux.filter(c=>c.id!==id); renderHorses(); sauvegarder(); }
function utiliserNotePMU(id, note) {
  const c=chevaux.find(x=>x.id===id); if (!c) return;
  c.note=note;
  const badge=document.getElementById(`badge-${id}`); if(badge) badge.classList.add('applied');
  // Rafraîchir l'avertissement divergence
  const wrap=document.getElementById(`warn-${id}`);
  if (wrap) wrap.innerHTML=''; // note acceptée, plus de warning
  sauvegarder();
}
function updateCheval(id, field, val) {
  const c=chevaux.find(x=>x.id===id); if (!c) return;
  c[field]=field==='numero'?parseInt(val)||0:parseFloat(val)||0;
  clearTimeout(_sv); _sv=setTimeout(()=>{ sauvegarder(); if(field==='numero') refreshBadge(id); if(field==='note') refreshWarn(id); },400);
}
function refreshBadge(id) {
  const c=chevaux.find(x=>x.id===id); if(!c) return;
  const pmu=notesPMU[c.numero], wrap=document.getElementById(`badge-wrap-${id}`); if(!wrap) return;
  const avis=pmu?(pmu.avis===1?'🟢':pmu.avis===-1?'🔴':'⚪'):'';
  wrap.innerHTML=pmu?`<div id="badge-${id}" class="pmu-badge${c.note===pmu.note_pmu?' applied':''}" onclick="utiliserNotePMU(${id},${pmu.note_pmu})">${avis} PMU:${pmu.note_pmu}</div>`:'';
}
function refreshWarn(id) {
  const c=chevaux.find(x=>x.id===id); if(!c) return;
  const pmu=notesPMU[c.numero], wrap=document.getElementById(`warn-${id}`); if(!wrap) return;
  wrap.innerHTML=(pmu&&c.note!==''&&c.note!==pmu.note_pmu)?`<div class="note-diff-warn">⚡ Manuel:${c.note} vs PMU:${pmu.note_pmu}</div>`:'';
}

function viderCourse() {
  chevaux=[]; horseCounter=0; predictions=null; notesPMU={}; notesPMUData=null; effacer();
  clearPmuProgress('');
  document.getElementById('pmu-retry-banner').classList.remove('show');
  renderHorses();
  document.getElementById('selections-content').innerHTML='<div class="empty"><div class="empty-icon">🎯</div>Analysez une course<br>pour voir les sélections</div>';
  document.getElementById('analyse-content').innerHTML='<div class="empty"><div class="empty-icon">🔬</div>Chargez les notes PMU<br>pour voir l\'analyse détaillée</div>';
  document.getElementById('result-section').style.display='none';
  document.getElementById('result-content').innerHTML='';
  setBadge(false);
}

function renderHorses() {
  const list=document.getElementById('horse-list');
  if (!chevaux.length){list.innerHTML='<div style="text-align:center;padding:24px;color:var(--text-dim);font-family:\'Space Mono\',monospace;font-size:10px;letter-spacing:1px;">Aucun cheval — + pour ajouter</div>';return;}
  list.innerHTML=chevaux.map(c=>{
    const pmu=notesPMU[c.numero], avis=pmu?(pmu.avis===1?'🟢':pmu.avis===-1?'🔴':'⚪'):'';
    const badge=pmu?`<div id="badge-${c.id}" class="pmu-badge${c.note===pmu.note_pmu?' applied':''}" onclick="utiliserNotePMU(${c.id},${pmu.note_pmu})" title="${pmu.nom||''} · ${pmu.proba_pmu}% · cote ${pmu.cote}">${avis} PMU:${pmu.note_pmu}</div>`:'';
    const warn=(pmu&&c.note!==''&&c.note!==pmu.note_pmu)?`<div class="note-diff-warn">⚡ Manuel:${c.note} vs PMU:${pmu.note_pmu}</div>`:'';
    return `<div class="horse-row">
      <input type="number" class="horse-num-input" value="${c.numero}" onchange="updateCheval(${c.id},'numero',this.value)" min="1" max="99" step="1">
      <div class="horse-note-wrap">
        <input type="number" placeholder="Note" value="${c.note}" onchange="updateCheval(${c.id},'note',this.value)" min="0" max="20" step="1">
        <div id="badge-wrap-${c.id}">${badge}</div>
        <div id="warn-${c.id}">${warn}</div>
      </div>
      <input type="number" placeholder="Cote" value="${c.rapport}" onchange="updateCheval(${c.id},'rapport',this.value)" min="0" step="0.1">
      <div class="btn-icon" onclick="supprimerCheval(${c.id})">✕</div>
    </div>`;
  }).join('');
}

// ── Sélections ──
function renderSelections(data, pmuMap) {
  pmuMap=pmuMap||{};
  const sorted=[...data.tous].sort((a,b)=>b.proba_absolu-a.proba_absolu);
  const T=3, exps=sorted.map(h=>Math.exp((h.proba_absolu/100)*T)), sum=exps.reduce((s,v)=>s+v,0);
  const wc=sorted.map((h,i)=>({...h, nom:pmuMap[h.numero]?.nom||'', confiance:Math.round(exps[i]/sum*1000)/10, barW:Math.round(exps[i]/exps[0]*100)}));
  const g=wc[0];
  const LABELS=['🥇 Gagnant','🥈 2ème','🥉 3ème','4ème','5ème','🃏 Joker 1','🃏 Joker 2'];
  function row(h,i){
    const hl=i<5, jk=i>=5, cls=i<3?'sel-circle highlight':jk?'sel-circle joker':'sel-circle';
    return `<div class="sel-row fade-in fd${Math.min(i+1,4)}" style="opacity:${hl?'1':'.5'}">
      <div class="sel-rank">${LABELS[i]||(i+1)+'ème'}</div>
      <div class="${cls}">${h.numero}</div>
      <div class="sel-body">
        ${h.nom?`<div class="sel-name">${h.nom}</div>`:''}
        <div class="sel-cote">cote ${h.rapport} · note ${h.note}/20</div>
        <div class="sel-bar-track"><div class="${hl?'sel-bar-fill':'sel-bar-fill dim'}" style="width:${h.barW}%"></div></div>
      </div>
      <div class="sel-conf" style="opacity:${hl?'1':'.4'}">
        <div class="${hl?'sel-conf-val':'sel-conf-val dim'}">${h.confiance}%</div>
        <div class="sel-conf-label">confiance</div>
      </div>
    </div>`;
  }
  document.getElementById('selections-content').innerHTML=`
    <div class="pred-meta fade-in">${sorted.length} partants · ${currentDate||"Aujourd'hui"}</div>
    <div class="winner-card fade-in">
      <div class="winner-num">${g.numero}</div>
      <div class="winner-info">
        <div class="winner-label">Gagnant estimé</div>
        ${g.nom?`<div class="winner-name">${g.nom}</div>`:''}
        <div class="winner-note">Note ${g.note}/20 · Cote ${g.rapport}</div>
      </div>
      <div class="winner-conf"><div class="winner-conf-val">${g.confiance}%</div><div class="winner-conf-label">confiance</div></div>
    </div>
    <div class="section-title">Top 3</div>
    <div class="card">${wc.slice(0,3).map((h,i)=>row(h,i)).join('')}</div>
    <div class="section-title">Champ réduit <span style="font-size:9px;color:var(--text-dim);font-family:'Space Mono',monospace">top 5 + 2 jokers</span></div>
    <div class="card">${wc.slice(0,7).map((h,i)=>row(h,i)).join('')}</div>`;
}

// ── Analyse V6 ──
function renderAnalyse(data) {
  const liste=[...data.chevaux].sort((a,b)=>b.note_pmu-a.note_pmu);
  const version=data.version||'v6';
  const DIMS=[{k:'forme',l:'Forme',i:'🎵',c:'#c8942a'},{k:'duo',l:'Duo',i:'🤝',c:'#b5603a'},{k:'historique',l:'Palmarès',i:'📈',c:'#3a9162'},{k:'gains',l:'Gains',i:'💰',c:'#5c8cbf'},{k:'adequation',l:'Adéquat.',i:'🎯',c:'#8a6cbf'},{k:'cote',l:'Cote',i:'📊',c:'#5c8c7a'}];
  const notesM={}; chevaux.forEach(c=>{notesM[c.numero]=c.note;});
  const cards=liste.map((h,i)=>{
    const sc=h.scores||{}, rc=i===0?'var(--gold)':i===1?'#888':i===2?'var(--copper)':'var(--border2)';
    const med=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const dc=(h.taux_disq||0)>20?'#e05c5c':(h.taux_disq||0)>10?'var(--copper)':'#5fcd8a';
    const nm=notesM[h.numero]; const dw=(nm!==undefined&&nm!==''&&nm!==h.note_pmu)?`<div class="note-diff-warn">⚡ Note utilisée: ${nm} (PMU: ${h.note_pmu})</div>`:'';
    return `<div class="analyse-card ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''} fade-in fd${Math.min(i+1,4)}">
      <div class="analyse-header">
        <div class="analyse-avatar" style="border-color:${rc};color:${rc}">${h.numero}</div>
        <div class="analyse-info">
          <div class="analyse-name">${med} ${h.nom||'Cheval '+h.numero}</div>
          <div class="analyse-sub">cote ${h.cote??'—'} · ${h.driver||'—'} <span style="margin-left:4px">${h.avis===1?'🟢':h.avis===-1?'🔴':'🟡'}</span></div>
          ${dw}
        </div>
        <div class="analyse-note" style="color:${rc}">${h.note_pmu}<span>/20</span></div>
      </div>
      <div class="dim-grid">${DIMS.map(d=>{const v=sc[d.k]??0;return `<div class="dim-cell"><div class="dim-label">${d.i} ${d.l}</div><div class="dim-bar-track"><div class="dim-bar-fill" style="width:${v}%;background:${d.c}"></div></div><div class="dim-val" style="color:${d.c}">${v}</div></div>`;}).join('')}</div>
      <div class="analyse-footer"><span>⚠️ Taux disq.</span><span style="font-weight:700;color:${dc}">${h.taux_disq||0}%</span><span style="margin-left:auto;font-size:8px;color:var(--text-dim)">${version}</span></div>
    </div>`;
  }).join('');
  document.getElementById('analyse-content').innerHTML=`<div class="pred-meta fade-in">${liste.length} chevaux · ${data.date||currentDate||''} <span class="version-badge">${version}</span></div>${cards}`;
}

// ── Stats ──
let statsChargees=false;
async function chargerStats() {
  if (statsChargees) return;
  document.getElementById('stats-content').innerHTML='<div class="loading-block"><div class="spinner spinner-gold"></div><span>Calcul…</span></div>';
  try {
    const resp=await fetch(`${API_URL}/health`,{signal:AbortSignal.timeout(10000)});
    const data=resp.ok?await resp.json():{};
    const hist=JSON.parse(localStorage.getItem(LS_HIST)||'[]');
    renderStats(data.courses||0,hist); statsChargees=true;
  } catch {
    document.getElementById('stats-content').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div>Impossible de charger<br><div style="margin-top:12px;"><button class="btn secondary" onclick="statsChargees=false;chargerStats();" style="font-size:10px;">↺ Réessayer</button></div></div>`;
  }
}
function renderStats(nb, hist) {
  const n=hist.length, a1=n?Math.round(hist.filter(h=>h.top1_ok).length/n*100):0, a3=n?Math.round(hist.filter(h=>h.top3_ok).length/n*100):0;
  const DIMS=[{l:'Adéquation course',p:26,c:'#8a6cbf'},{l:'Forme / Musique',p:21,c:'var(--gold)'},{l:'Duo cheval/driver',p:17,c:'var(--copper)'},{l:'Historique',p:14,c:'#3a9162'},{l:'Cote & marché',p:11,c:'#5c8c7a'},{l:'Gains / Palmarès',p:8,c:'#5c8cbf'}];
  document.getElementById('stats-content').innerHTML=`
    <div class="section-title">Base de données</div>
    <div class="kpi-grid fade-in">
      <div class="kpi accent"><div class="kpi-val">${nb.toLocaleString('fr')}</div><div class="kpi-label">Courses historique</div></div>
      <div class="kpi"><div class="kpi-val">${(nb*9).toLocaleString('fr')}</div><div class="kpi-label">Lignes estimées</div></div>
      <div class="kpi"><div class="kpi-val">V6</div><div class="kpi-label">Version modèle</div></div>
      <div class="kpi"><div class="kpi-val">6</div><div class="kpi-label">Dimensions</div></div>
    </div>
    <div class="section-title">Précision locale</div>
    <div class="stat-block fade-in fd1">
      <div class="stat-block-title">${n} prédiction${n!==1?'s':''} enregistrée${n!==1?'s':''}</div>
      ${n===0?`<div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);line-height:1.8">Enregistrez des résultats après vos prédictions pour voir votre précision ici.</div>`
      :`<div class="acc-row"><div class="acc-label">Gagnant exact</div><div class="acc-track"><div class="acc-fill" style="width:${a1}%"></div></div><div class="acc-pct">${a1}%</div></div>
        <div class="acc-row"><div class="acc-label">Top 3 correct</div><div class="acc-track"><div class="acc-fill" style="width:${a3}%"></div></div><div class="acc-pct">${a3}%</div></div>`}
    </div>
    <div class="section-title">Distribution notes</div>
    <div class="stat-block fade-in fd2">
      <div class="stat-block-title">Course courante (notes PMU)</div>
      ${buildDist()}
    </div>
    <div class="section-title">Pondérations V6</div>
    <div class="stat-block fade-in fd3">
      <div class="stat-block-title">6 dimensions du score métier</div>
      ${DIMS.map(d=>`<div class="acc-row"><div class="acc-label" style="width:120px;font-size:8px">${d.l}</div><div class="acc-track"><div class="acc-fill" style="width:${d.p*3.8}%;background:${d.c}"></div></div><div class="acc-pct" style="color:${d.c}">${d.p}%</div></div>`).join('')}
    </div>`;
  if (predictions&&chevaux.length>0) document.getElementById('result-section').style.display='block';
}
function buildDist() {
  const notes=Object.values(notesPMU).map(c=>c.note_pmu).filter(n=>n!==undefined);
  if (!notes.length) return `<div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim)">Chargez des notes PMU pour voir la distribution.</div>`;
  return [{l:'16-20',m:16,x:20,c:'var(--gold)'},{l:'11-15',m:11,x:15,c:'var(--copper)'},{l:'6-10',m:6,x:10,c:'var(--text-mid)'},{l:'1-5',m:1,x:5,c:'var(--text-dim)'}].map(t=>{
    const cnt=notes.filter(n=>n>=t.m&&n<=t.x).length;
    return `<div class="dist-row"><div class="dist-label">${t.l}</div><div class="dist-track"><div class="dist-fill" style="width:${Math.round(cnt/notes.length*100)}%;background:${t.c}"></div></div><div class="dist-count">${cnt}</div></div>`;
  }).join('');
}

// ── Résultats ──
function renderResultForm(payload) {
  const pMap={}; if(predictions?.tous) predictions.tous.forEach(h=>{pMap[h.numero]=h;});
  document.getElementById('result-section').style.display='block';
  document.getElementById('result-content').innerHTML=`
    <div class="card">
      <div style="margin-bottom:14px;"><div class="field-label">Date</div><input type="text" id="res-date" value="${currentDate}" readonly></div>
      <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px">Cheval · prédiction — rang d'arrivée</div>
      ${payload.map(c=>{
        const pred=pMap[c.numero], pmu=notesPMU[c.numero], nom=pmu?.nom||'', isTop=pred?.top3_absolu||false;
        return `<div class="result-horse">
          <div class="result-num">${c.numero}</div>
          <div>
            ${nom?`<div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px">${nom}</div>`:''}
            <div class="result-pred${isTop ? ' top' : ''}">note ${c.note} · cote ${c.rapport}${isTop ? ' · 🎯 top3' : ''}</div>
          </div>
          <input type="number" class="rang-input" id="rang-${c.numero}" placeholder="Rang" min="1" max="99" step="1">
        </div>`;
      }).join('')}
    </div>
    <button class="btn full" onclick="envoyerResultats()">Enregistrer les résultats →</button>`;
}
async function envoyerResultats() {
  if (!predictions){toast('Lancez d\'abord une prédiction','error');return;}
  const date=document.getElementById('res-date').value; if(!date){toast('Date requise','error');return;}
  const cr=[]; let ok=true;
  chevaux.forEach(c=>{const inp=document.getElementById(`rang-${c.numero}`);if(!inp||!inp.value){ok=false;return;}cr.push({numero:c.numero,note:c.note,rapport:c.rapport,rang_arrivee:parseInt(inp.value)});});
  if (!ok||!cr.length){toast('Remplissez tous les rangs','error');return;}
  const btn=event.target; btn.disabled=true; btn.innerHTML='<div class="spinner"></div> Enregistrement…';
  try {
    const resp=await fetch(`${API_URL}/ajouter`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date,chevaux:cr}),signal:AbortSignal.timeout(60000)});
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const res=await resp.json();
    try {
      const hist=JSON.parse(localStorage.getItem(LS_HIST)||'[]');
      const top=predictions?.tous?[...predictions.tous].sort((a,b)=>b.proba_absolu-a.proba_absolu)[0]:null;
      const gag=cr.find(c=>c.rang_arrivee===1);
      hist.push({date,top1_ok:!!(top&&gag&&top.numero===gag.numero),top3_ok:!!(top&&cr.filter(c=>c.rang_arrivee<=3).some(c=>c.numero===top.numero))});
      localStorage.setItem(LS_HIST,JSON.stringify(hist.slice(-200)));
    } catch {}
    toast(`✓ Enregistré · ${res.nb_courses} courses`,'success');
    statsChargees=false; setBadge(false);
    if (navigator.vibrate) navigator.vibrate([30,50,30]);
    document.getElementById('result-content').innerHTML=`<div class="empty"><div class="empty-icon">✅</div>Course du ${date} enregistrée<br><span style="font-size:9px;color:var(--text-dim)">${res.nb_lignes} lignes · ${res.nb_courses} courses</span></div>`;
    viderCourse();
  } catch(e) {
    toast('Erreur lors de l\'enregistrement','error');
    const r=document.createElement('div'); r.className='retry-banner show'; r.style.marginTop='10px';
    r.innerHTML=`<span class="retry-banner-text">${e.message}</span><button class="retry-btn" onclick="envoyerResultats()">↺ Réessayer</button>`;
    btn.parentNode.insertBefore(r,btn.nextSibling);
  } finally { btn.disabled=false; btn.innerHTML='Enregistrer les résultats →'; }
}

// ── Toast ──
let _tt;
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+type;clearTimeout(_tt);_tt=setTimeout(()=>el.className='toast',3000);}
</script>
</body>
